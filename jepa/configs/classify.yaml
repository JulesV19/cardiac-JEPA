# Phase 2 — fine-tuning complet du classifieur multi-label (5 superclasses).
# L'architecture du modèle vient du checkpoint JEPA, pas d'ici.
train:
  batch_size: 128
  epochs: 30
  head_lr: 1.0e-3        # tête linéaire : apprend vite, part de zéro
  encoder_lr: 1.0e-4     # encodeur : 10x plus lent, il part d'une bonne initialisation
  weight_decay: 0.05
  warmup_frac: 0.1
  num_workers: 4
  amp: true
