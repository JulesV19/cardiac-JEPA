# Config CNN-JEPA v2 — encodeur 1D élargi (~6,25 M params, capacité ~ViT-tiny).
# v1 (cnn.yaml, 1,27 M) battait déjà le ViT fine-tuné ; v2 teste jusqu'où monte le plafond.
model:
  encoder_type: cnn
  grid_h: 1                # les 12 dérivations sont des CANAUX, pas des tokens
  grid_w: 40               # 40 tokens temporels (1000 / 25)
  patch_len: 25
  embed_dim: 256           # tokens de sortie plus larges (v1 : 192)
  # --- encodeur CNN élargi ---
  cnn_channels: [96, 192, 384]   # 3 étages (v1 : [64, 128])
  cnn_blocks_per_stage: 2
  cnn_strides: [5, 5, 1]         # produit = 25 -> 1000 -> 40 tokens (3e étage sans downsample)
  cnn_kernel: 7
  # --- predictor (transformer, bottleneck ~embed/2) ---
  pred_dim: 128
  pred_depth: 6
  pred_heads: 4

mask:
  # identique à v1 : grille 1x40, blocs temporels larges (aspect petit car h forcé à 1).
  num_target_blocks: 3
  target_scale: [0.10, 0.18]
  target_aspect: [0.10, 0.25]
  min_context_tokens: 8

train:
  batch_size: 256
  epochs: 100
  base_lr: 1.5e-4
  weight_decay: 0.05
  warmup_frac: 0.1
  lambda_var: 1.0
  lambda_cov: 0.04
  ema_start: 0.996
  ema_end: 1.0
  num_workers: 4
  amp: true
  log_every: 20
  val_batches: 8
  ckpt_every: 20
