# Backbone CNN (ConvEncoder, GroupNorm) branché au JEPA — iso-capacité ~6,25 M (ex « v2 »).
# Sections : model/mask/train = pré-entraînement JEPA ; eval = sonde + fine-tuning.
model:
  encoder_type: cnn
  grid_h: 1                # 12 dérivations = CANAUX ; grille de tokens 1x40
  grid_w: 40
  patch_len: 25
  embed_dim: 256
  cnn_channels: [96, 192, 384]
  cnn_blocks_per_stage: 2
  cnn_strides: [5, 5, 1]   # produit = 25 -> 40 tokens
  cnn_kernel: 7
  pred_dim: 128
  pred_depth: 6
  pred_heads: 4

mask:
  num_target_blocks: 3
  target_scale: [0.10, 0.18]
  target_aspect: [0.10, 0.25]
  min_context_tokens: 8

train:
  batch_size: 256
  epochs: 100
  base_lr: 1.5e-4
  weight_decay: 0.05
  warmup_frac: 0.1
  lambda_var: 1.0
  lambda_cov: 0.04
  ema_start: 0.996
  ema_end: 1.0
  num_workers: 2
  amp: true
  log_every: 20
  val_batches: 8
  ckpt_every: 20

eval:
  batch_size: 128
  max_epochs: 40
  head_lr: 1.0e-3
  encoder_lr: 1.0e-4
  weight_decay: 0.05
  warmup_frac: 0.1
  patience: 6
  min_delta: 0.001
  n_boot: 2000
  num_workers: 2
  amp: true
