# Backbone ViT-tiny branché au JEPA. Grille 12 dérivations × 40 patches temporels (~6,0 M).
# Sections : model/mask/train = pré-entraînement JEPA ; eval = sonde + fine-tuning.
model:
  encoder_type: vit
  grid_h: 12
  grid_w: 40
  patch_len: 25
  embed_dim: 192
  depth: 12
  heads: 3
  mlp_ratio: 4.0
  pred_dim: 96
  pred_depth: 6
  pred_heads: 3

mask:
  num_target_blocks: 4
  target_scale: [0.15, 0.20]
  target_aspect: [0.5, 2.0]
  min_context_tokens: 48

train:
  batch_size: 256
  epochs: 100
  base_lr: 1.5e-4
  weight_decay: 0.05
  warmup_frac: 0.1
  lambda_var: 1.0
  lambda_cov: 0.04
  ema_start: 0.996
  ema_end: 1.0
  num_workers: 4
  amp: true
  log_every: 20
  val_batches: 8
  ckpt_every: 20

eval:
  batch_size: 128
  max_epochs: 40
  head_lr: 1.0e-3
  encoder_lr: 1.0e-4
  weight_decay: 0.05
  warmup_frac: 0.1
  patience: 6
  min_delta: 0.001
  n_boot: 2000
  num_workers: 4
  amp: true
